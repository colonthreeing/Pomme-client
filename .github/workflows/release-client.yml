name: Release client

on:
  push:
    tags: ["client-v*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build-client:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: pomme-client.exe
            name: pomme-client-windows-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: pomme-client
            name: pomme-client-linux-x64-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: pomme-client
            name: pomme-client-macos-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@b394a1abed9cb019d8e637eeadac93d73e0853da
        with:
          vulkan_version: 1.4.341.0
          install_runtime: false
          cache: true
          stripdown: true

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev cmake

      - name: Build
        run: cargo build -p pomme-client --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          mkdir -p dist
          tar czf "dist/${{ matrix.name }}.tar.gz" -C "target/${{ matrix.target }}/release" "${{ matrix.artifact }}"

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Compress-Archive -Path "target/${{ matrix.target }}/release/${{ matrix.artifact }}" -DestinationPath "dist/${{ matrix.name }}.zip"

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: dist/
          if-no-files-found: error

  release-client:
    needs: build-client

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get previous client tag
        id: prev
        shell: bash
        run: |
          git fetch --tags --force
          PREV=$(git tag --list "client-v*" --sort=-v:refname | sed -n '2p')
          if [ -z "$PREV" ]; then
            echo "tag=" >> $GITHUB_OUTPUT
          else
            echo "tag=$PREV" >> $GITHUB_OUTPUT
          fi

      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          previous_tag: ${{ steps.prev.outputs.tag || '' }}
          files: dist/*
          generate_release_notes: ${{ steps.prev.outputs.tag != '' }}
