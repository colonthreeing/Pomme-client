name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  client:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: client
          cache-on-failure: true

      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@b394a1abed9cb019d8e637eeadac93d73e0853da
        with:
          vulkan_version: 1.4.341.0
          install_runtime: false
          cache: true
          stripdown: true

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libvulkan-dev libxkbcommon-dev libwayland-dev

      - name: Format check
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt -p pomme-client -- --check

      - name: Clippy
        run: cargo clippy -p pomme-client --release --all-targets --all-features -- -D warnings

      - name: Build
        run: cargo build -p pomme-client --release

      - name: Upload artifact (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v7
        with:
          name: pomme-client-windows
          path: target/release/pomme-client.exe

      - name: Upload artifact (Unix)
        if: matrix.os != 'windows-latest'
        uses: actions/upload-artifact@v7
        with:
          name: pomme-client-${{ matrix.os }}
          path: target/release/pomme-client

  launcher-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Format check
        run: pnpm --filter pomme-launcher format:check

      - name: Lint
        run: pnpm --filter pomme-launcher lint

      - name: Type check
        run: pnpm --filter pomme-launcher exec tsc --noEmit

  launcher:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: launcher
          cache-on-failure: true

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Format check
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt -p pomme-launcher -- --check

      - name: Clippy
        run: cargo clippy -p pomme-launcher --release --all-targets --all-features -- -D warnings

      - name: Check bindings are up to date
        if: matrix.os == 'ubuntu-latest'
        run: |
          cargo run -p pomme-launcher --quiet --bin generate-bindings
          if ! git diff --exit-code -- ./pomme-launcher/src/bindings; then
            echo "::error::pomme-launcher/src/bindings is stale. Run 'cargo run -p pomme-launcher --bin generate-bindings' and commit."
            exit 1
          fi

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Build launcher
        run: pnpm --filter pomme-launcher tauri build

      - name: Upload launcher (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v7
        with:
          name: pomme-launcher-windows
          path: target/release/pomme-launcher.exe

      - name: Upload launcher (Unix)
        if: matrix.os != 'windows-latest'
        uses: actions/upload-artifact@v7
        with:
          name: pomme-launcher-${{ matrix.os }}
          path: target/release/pomme-launcher
